name: mathocrclaw
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip>=25
  - ccache
  - pip:
      # Application-level dependencies only. Platform-specific CUDA packages
      # are resolved by PyTorch on Linux instead of being pinned here.
      - chardet==5.2.0
      - numpy==2.2.6
      - openai==2.9.0
      - opencv-python==4.10.0.84
      - paddleocr==3.3.2
      - paddlepaddle==3.2.0
      - pillow==11.3.0
      - python-dotenv==1.2.1
      - requests==2.32.5
      - rfdetr==1.3.0
      - supervision==0.26.1
      - torch==2.9.0
      - torchvision==0.24.0
      - transformers==4.57.1
